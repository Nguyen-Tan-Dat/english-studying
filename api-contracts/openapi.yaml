openapi: 3.1.0
info:
  title: LexiGo API
  version: 0.9.0-rc.1
  description: API freeze candidate aligned with LexiGo UI/UX v2.0. Contract-first source of truth for frontend, backend,
    QA and mock development. Mutable resources use ETag/If-Match. High-risk commands use Idempotency-Key.
  contact:
    name: LexiGo Dev Lead
  x-contract-status: FREEZE_CANDIDATE
  x-approved-uiux-version: '2.0'
  x-scope-freeze-date: '2026-07-15'
servers:
- url: http://localhost:4010/api/v1
  description: Local mock
- url: https://api.dev.lexigo.example/api/v1
  description: Development
- url: https://api.staging.lexigo.example/api/v1
  description: Staging
- url: https://api.lexigo.example/api/v1
  description: Production
tags:
- name: System
  description: Health and client runtime policy
- name: Auth
  description: Authentication and rotating refresh sessions
- name: User
  description: Current user and learner dashboard
- name: TopicTrees
  description: Topic tree workspace and mutations
- name: Vocabulary
  description: Vocabulary entries
- name: Publishing
  description: Draft/publication lifecycle
- name: PublicLibrary
  description: Public discovery and cloning
- name: Collaboration
  description: Collaborators and invitations
- name: Queries
  description: Boolean query parsing, preview and saved lists
- name: Imports
  description: Excel import pipeline
- name: Study
  description: Study sessions and pronunciation
- name: Operations
  description: Asynchronous operation status
- name: Admin
  description: Administrative dashboard and audit
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags:
      - System
      responses:
        '200':
          description: Healthy
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
                  version:
                    type: string
      security: []
  /client-policy:
    get:
      summary: Get runtime limits and policy
      operationId: getClientPolicy
      tags:
      - System
      responses:
        '200':
          description: Policy
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientPolicy'
        '500':
          $ref: '#/components/responses/InternalServerError'
      description: Frontend must read or centrally configure these values; do not hard-code import/tree/query limits in individual
        screens.
      security: []
  /auth/register:
    post:
      summary: Register learner account
      operationId: registerAccount
      tags:
      - Auth
      responses:
        '201':
          description: Registered
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Set-Cookie:
              description: Rotating HttpOnly refresh cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              - display_name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                display_name:
                  type: string
                  minLength: 1
                  maxLength: 80
      security: []
  /auth/login:
    post:
      summary: Login
      operationId: login
      tags:
      - Auth
      responses:
        '200':
          description: Authenticated
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Set-Cookie:
              description: Rotating HttpOnly refresh cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      security: []
  /auth/refresh:
    post:
      summary: Rotate refresh session
      operationId: refreshSession
      tags:
      - Auth
      responses:
        '200':
          description: Refreshed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Set-Cookie:
              description: Rotated HttpOnly refresh cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - RefreshCookie: []
  /auth/logout:
    post:
      summary: Logout current session
      operationId: logout
      tags:
      - Auth
      responses:
        '204':
          description: Logged out
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Set-Cookie:
              description: Cleared refresh cookie.
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /me:
    get:
      summary: Get current user
      operationId: getCurrentUser
      tags:
      - User
      responses:
        '200':
          description: Current user
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update current profile
      operationId: updateCurrentUser
      tags:
      - User
      responses:
        '200':
          description: Updated
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                display_name:
                  type: string
                  minLength: 1
                  maxLength: 80
                avatar_url:
                  type:
                  - string
                  - 'null'
                  format: uri
  /me/stats:
    get:
      summary: Get learner dashboard statistics
      operationId: getLearnerStats
      tags:
      - User
      responses:
        '200':
          description: Statistics
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /topic-trees:
    get:
      summary: List accessible Topic trees
      operationId: listTopicTrees
      tags:
      - TopicTrees
      responses:
        '200':
          description: Topic trees
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                - meta
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TopicTree'
                  meta:
                    $ref: '#/components/schemas/PageMeta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/Search'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/Sort'
      - name: kind
        in: query
        schema:
          type: string
          enum:
          - DEFAULT
          - USER
      - name: access
        in: query
        schema:
          type: string
          enum:
          - OWNED
          - SHARED
          - ALL
      - name: status
        in: query
        schema:
          type: string
          enum:
          - PRIVATE
          - PUBLISHED
          - DRAFT
    post:
      summary: Create Topic tree
      operationId: createTopicTree
      tags:
      - TopicTrees
      responses:
        '201':
          description: Created
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicTree'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTreeRequest'
  /topic-trees/{treeId}:
    parameters:
    - $ref: '#/components/parameters/TreeId'
    get:
      summary: Get Topic tree
      operationId: getTopicTree
      tags:
      - TopicTrees
      responses:
        '200':
          description: Topic tree
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicTree'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update Topic tree metadata
      operationId: updateTopicTree
      tags:
      - TopicTrees
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicTree'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTreeRequest'
    delete:
      summary: Soft-delete Topic tree
      operationId: deleteTopicTree
      tags:
      - TopicTrees
      responses:
        '204':
          description: Deleted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/IfMatch'
  /topic-trees/{treeId}/workspace:
    parameters:
    - $ref: '#/components/parameters/TreeId'
    get:
      summary: Bootstrap Topic Tree workspace
      operationId: getTopicTreeWorkspace
      tags:
      - TopicTrees
      responses:
        '200':
          description: Workspace bootstrap
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeWorkspaceBootstrap'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      description: 'UI-optimized read model for the v2.0 three-zone workspace: tree metadata, root nodes, permission capabilities
        and filter counts in one request.'
  /topic-trees/{treeId}/nodes:
    parameters:
    - $ref: '#/components/parameters/TreeId'
    get:
      summary: List root or child Topic nodes
      operationId: listTopicNodes
      tags:
      - TopicTrees
      responses:
        '200':
          description: Nodes
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicNodeCursorList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - name: parent_id
        in: query
        description: Omit to load roots.
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: type
        in: query
        schema:
          type: string
          enum:
          - GROUP
          - VOCABULARY
      - name: status
        in: query
        schema:
          type: string
          enum:
          - PRIVATE
          - PUBLISHED
          - DRAFT
    post:
      summary: Create Topic node
      operationId: createTopicNode
      tags:
      - TopicTrees
      responses:
        '201':
          description: Created
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicNode'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
  /topic-trees/{treeId}/search:
    parameters:
    - $ref: '#/components/parameters/TreeId'
    get:
      summary: Search/filter within Topic tree
      operationId: searchTopicTree
      tags:
      - TopicTrees
      responses:
        '200':
          description: Context-preserving search result
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      description: Returns matching nodes plus required ancestors and suggested expanded IDs so the UI preserves context.
      parameters:
      - $ref: '#/components/parameters/Search'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: type
        in: query
        schema:
          type: string
          enum:
          - GROUP
          - VOCABULARY
      - name: scope
        in: query
        schema:
          type: string
          enum:
          - ALL
          - SYSTEM
          - MINE
      - name: status
        in: query
        schema:
          type: string
          enum:
          - PRIVATE
          - PUBLISHED
          - DRAFT
  /topic-nodes/{nodeId}:
    parameters:
    - $ref: '#/components/parameters/NodeId'
    get:
      summary: Get Topic node
      operationId: getTopicNode
      tags:
      - TopicTrees
      responses:
        '200':
          description: Node
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicNode'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update Topic node
      operationId: updateTopicNode
      tags:
      - TopicTrees
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicNode'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNodeRequest'
    delete:
      summary: Soft-delete Topic subtree
      operationId: deleteTopicNode
      tags:
      - TopicTrees
      responses:
        '204':
          description: Deleted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/IfMatch'
  /topic-nodes/{nodeId}/children:
    parameters:
    - $ref: '#/components/parameters/NodeId'
    get:
      summary: Lazy-load child nodes
      operationId: listTopicNodeChildren
      tags:
      - TopicTrees
      responses:
        '200':
          description: Children
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicNodeCursorList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
  /topic-nodes/{nodeId}/move-preview:
    parameters:
    - $ref: '#/components/parameters/NodeId'
    post:
      summary: Preview a node move
      operationId: previewTopicNodeMove
      tags:
      - TopicTrees
      responses:
        '200':
          description: Move preview
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovePreview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveNodeRequest'
  /topic-nodes/{nodeId}/move:
    parameters:
    - $ref: '#/components/parameters/NodeId'
    post:
      summary: Move/reorder Topic node
      operationId: moveTopicNode
      tags:
      - TopicTrees
      responses:
        '200':
          description: Moved
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicNode'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveNodeRequest'
  /topic-nodes/{nodeId}/vocabularies:
    parameters:
    - $ref: '#/components/parameters/NodeId'
    get:
      summary: List vocabulary in Topic node
      operationId: listNodeVocabularies
      tags:
      - Vocabulary
      responses:
        '200':
          description: Vocabulary list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                - meta
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/VocabularyEntry'
                  meta:
                    $ref: '#/components/schemas/PageMeta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':

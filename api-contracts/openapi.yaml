security:
- BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    RefreshCookie:
      type: apiKey
      in: cookie
      name: lexigo_refresh
      description: Rotating HttpOnly Secure refresh cookie.
  headers:
    ETag:
      description: Weak ETag representing the current mutable resource version.
      schema:
        type: string
        example: W/"topic-node-12"
    XRequestId:
      description: Request correlation identifier.
      schema:
        type: string
        example: 01J2YQ9K7J7G6ZSW2E6K8J4M0H
    RetryAfter:
      description: Seconds before retry.
      schema:
        type: integer
        minimum: 1
    IdempotencyReplayed:
      description: True when a previous response was replayed for the same idempotency key.
      schema:
        type: boolean
  parameters:
    TreeId:
      name: treeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VocabularyId:
      name: vocabularyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PublicationId:
      name: publicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CollaboratorId:
      name: collaboratorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvitationToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 20
    QueryId:
      name: queryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ImportJobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AttemptId:
      name: attemptId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Search:
      name: q
      in: query
      schema:
        type: string
        maxLength: 200
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      schema:
        type: string
        maxLength: 100
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: ETag returned by the latest GET/mutation response.
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key retained for at least 24 hours.
      schema:
        type: string
        minLength: 16
        maxLength: 100
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 64
  responses:
    BadRequest:
      description: Malformed request.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Unauthorized:
      description: Authentication required or token invalid.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Permission denied.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Resource not found or intentionally hidden.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: Domain or idempotency conflict.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PreconditionFailed:
      description: ETag/version conflict.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    UnprocessableEntity:
      description: Validation or business rule failure.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PreconditionRequired:
      description: If-Match or required command precondition missing.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalServerError:
      description: Unexpected server error.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    FieldError:
      type: object
      required:
      - field
      - code
      - message
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
        meta:
          type: object
          additionalProperties: true
    ProblemDetails:
      type: object
      required:
      - title
      - status
      - code
      - trace_id
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        code:
          type: string
        detail:
          type: string
        trace_id:
          type: string
        field_errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        current_etag:
          type:

        allowed_extensions:
          type: array
          items:
            type: string
          example:
          - xlsx
          - xls
        max_file_size_bytes:
          type: integer
          example: 10485760
        max_rows:
          type: integer
          example: 5000
        required_columns:
          type: array
          items:
            type: string
          example:
          - English
          - Vietnamese
        optional_columns:
          type: array
          items:
            type: string
          example:
          - Pronunciation
          - Part of speech
          - Example
          - Image URL
        virus_scan_required:
          type: boolean
          const: true

          enum:
          - PRIVATE
          - PUBLISHED
          default: PRIVATE
        expression:
          type: string
          maxLength: 2000
        aliases:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/QueryAlias'
        universe:
          type: string
          enum:
          - ALIASES_UNION
          - ALL_ACCESSIBLE
    ImportPolicy:
      type: object
      required:
